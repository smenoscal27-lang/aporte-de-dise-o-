<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta — EduQuest Bachillerato</title>
  <meta name="description" content="Regístrate en EduQuest Bachillerato y comienza tu aventura educativa gamificada.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
  <div class="auth-page">
    <div class="hero-bg-orbs">
      <div class="orb orb-1" style="opacity:0.2"></div>
      <div class="orb orb-3" style="opacity:0.15"></div>
    </div>

    <div class="auth-card animate-scale-in" style="max-width:520px">
      <!-- Logo -->
      <div class="auth-logo">
        <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:1.4rem">🎓</div>
        <div>
          <div style="font-family:var(--font-heading);font-size:1.2rem;font-weight:800;color:white">EduQuest</div>
          <div style="font-size:0.72rem;color:rgba(255,255,255,0.4);letter-spacing:0.08em;text-transform:uppercase">Bachillerato</div>
        </div>
      </div>

      <h1 class="auth-title">¡Crea tu cuenta!</h1>
      <p class="auth-subtitle">Únete y comienza a ganar XP desde hoy.</p>

      <!-- Avatar Selector -->
      <div style="margin-bottom:20px">
        <label class="form-label" style="color:rgba(255,255,255,0.6);display:block;margin-bottom:10px">
          <i class="fas fa-user-circle" style="margin-right:6px"></i>Elige tu avatar
        </label>
        <div class="avatar-grid" id="avatar-grid"></div>
        <input type="hidden" id="selected-avatar" value="0">
      </div>

      <form class="auth-form" id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="reg-name">
            <i class="fas fa-user" style="margin-right:6px"></i>Nombre completo
          </label>
          <input type="text" id="reg-name" class="form-input" placeholder="Tu nombre" autocomplete="name" required>
          <span class="form-error" id="name-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-email">
            <i class="fas fa-envelope" style="margin-right:6px"></i>Correo Electrónico
          </label>
          <input type="email" id="reg-email" class="form-input" placeholder="tu@correo.com" autocomplete="email" required>
          <span class="form-error" id="email-error"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-password">
            <i class="fas fa-lock" style="margin-right:6px"></i>Contraseña
          </label>
          <div class="input-wrapper">
            <input type="password" id="reg-password" class="form-input" placeholder="Mínimo 6 caracteres" required>
            <button type="button" class="input-toggle" id="toggle-pwd">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <!-- Password strength -->
          <div id="pwd-strength" style="margin-top:6px;display:none">
            <div class="progress-track" style="height:4px">
              <div id="pwd-strength-bar" class="progress-fill" style="width:0%;transition:all 0.3s"></div>
            </div>
            <span id="pwd-strength-label" class="form-hint" style="font-size:0.75rem"></span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-confirm">
            <i class="fas fa-check-circle" style="margin-right:6px"></i>Confirmar Contraseña
          </label>
          <input type="password" id="reg-confirm" class="form-input" placeholder="Repite tu contraseña" required>
          <span class="form-error" id="confirm-error"></span>
        </div>

        <div id="reg-error" style="display:none;padding:12px;background:var(--danger-light);border-radius:12px;text-align:center;color:var(--danger);font-size:0.88rem;margin-top:4px"></div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="reg-btn">
          <i class="fas fa-rocket"></i> Crear Cuenta
        </button>
      </form>

      <p class="auth-link">
        ¿Ya tienes cuenta? <a href="login.html">Iniciar Sesión</a>
      </p>
      <p class="auth-link" style="margin-top:8px">
        <a href="../index.html" style="color:rgba(255,255,255,0.3)"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
      </p>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="../js/data.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/gamification.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      EQ_UI.loadTheme();

      // Build avatar grid
      const grid = document.getElementById('avatar-grid');
      EQ_DATA.avatars.forEach((av, i) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'avatar-option' + (i === 0 ? ' selected' : '');
        btn.textContent = av;
        btn.dataset.index = i;
        btn.addEventListener('click', () => {
          grid.querySelectorAll('.avatar-option').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          document.getElementById('selected-avatar').value = i;
        });
        grid.appendChild(btn);
      });

      // Toggle password
      document.getElementById('toggle-pwd').addEventListener('click', function() {
        const input = document.getElementById('reg-password');
        const icon  = this.querySelector('i');
        input.type  = input.type === 'password' ? 'text' : 'password';
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
      });

      // Password strength
      document.getElementById('reg-password').addEventListener('input', function() {
        const val = this.value;
        const str = document.getElementById('pwd-strength');
        const bar = document.getElementById('pwd-strength-bar');
        const lbl = document.getElementById('pwd-strength-label');

        if (!val) { str.style.display = 'none'; return; }
        str.style.display = 'block';

        let score = 0;
        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const levels = [
          { w:'20%', c:'var(--danger)', t:'Muy débil' },
          { w:'40%', c:'var(--warning)', t:'Débil' },
          { w:'60%', c:'#F59E0B', t:'Regular' },
          { w:'80%', c:'var(--secondary)', t:'Fuerte' },
          { w:'100%', c:'#10B981', t:'Muy fuerte' },
        ];
        const lvl = levels[Math.min(score - 1, 4)] || levels[0];
        bar.style.width = lvl.w;
        bar.style.background = lvl.c;
        lbl.textContent = lvl.t;
        lbl.style.color = lvl.c;
      });

      // Form submit
      document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn      = document.getElementById('reg-btn');
        const name     = document.getElementById('reg-name').value;
        const email    = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        const confirm  = document.getElementById('reg-confirm').value;
        const avatar   = parseInt(document.getElementById('selected-avatar').value);
        const errEl    = document.getElementById('reg-error');

        errEl.style.display = 'none';

        if (password !== confirm) {
          document.getElementById('reg-confirm').classList.add('error');
          document.getElementById('confirm-error').textContent = 'Las contraseñas no coinciden.';
          return;
        }
        document.getElementById('confirm-error').textContent = '';

        btn.classList.add('loading');
        await new Promise(r => setTimeout(r, 500));

        const result = EQ_Auth.register(name, email, password, avatar);
        btn.classList.remove('loading');

        if (result.ok) {
          EQ_UI.showToast({ type:'success', icon:'🎉', title:'¡Cuenta creada!', message:`Bienvenido, ${result.user.name}!` });
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);
        } else {
          errEl.textContent = result.error;
          errEl.style.display = 'block';
        }
      });
    });
  </script>
</body>
</html>
